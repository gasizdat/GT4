name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore GT4.sln

      - name: Build
        run: |
          dotnet build Tests\GT4.Core.Project.Tests\GT4.Core.Project.Tests.csproj --no-restore --configuration Release
          dotnet build Tests\GT4.UI.Utils.Tests\GT4.UI.Utils.Tests.csproj --no-restore --configuration Release
          dotnet build Tests\GT4.UI.View.Tests\GT4.UI.View.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: |
          dotnet test Tests\GT4.Core.Project.Tests\GT4.Core.Project.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=core-project.trx"
          dotnet test Tests\GT4.UI.Utils.Tests\GT4.UI.Utils.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=ui-utils.trx"
          dotnet test Tests\GT4.UI.View.Tests\GT4.UI.View.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=ui-view.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'
