name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # Fast-fail gate: builds every non-mobile project in one shot (App.csproj and
      # AppAndroidOnly.csproj are excluded via the filter -- they need Android/iOS/MacCatalyst
      # workloads this runner doesn't have) so a break anywhere, including in projects no test
      # job builds on its own (e.g. GT4.Tools.RelativesCli), is caught immediately. Runs
      # independently of the test/test-device jobs below -- they keep restoring/building their
      # own project so the concurrency from #38 is unaffected.
      - name: Build solution
        run: dotnet build GT4.CI.slnf --configuration Release

      # AppWinOnly and GT4.UI.App.DeviceTests both conditionally target
      # net10.0-windows10.0.19041.0 in addition to other TFMs, so they're split into their own
      # filter and built with --framework: an unscoped build of DeviceTests here would also compile
      # its net10.0-android TFM, which nothing in CI tests (android device tests only run on
      # physical hardware) and which just slows this gate down.
      - name: Build solution (windows)
        run: dotnet build GT4.CI.Windows.slnf --configuration Release --framework net10.0-windows10.0.19041.0

  test:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - project: Tests\GT4.Core.Project.Tests\GT4.Core.Project.Tests.csproj
            name: core-project
          - project: Tests\GT4.UI.Utils.Tests\GT4.UI.Utils.Tests.csproj
            name: ui-utils
          - project: Tests\GT4.UI.View.Tests\GT4.UI.View.Tests.csproj
            name: ui-view

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build
        run: dotnet build ${{ matrix.project }} --configuration Release

      - name: Test
        run: dotnet test ${{ matrix.project }} --no-build --configuration Release --logger "trx;LogFileName=${{ matrix.name }}.trx" --collect "XPlat Code Coverage" --results-directory coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-${{ matrix.name }}
          path: coverage

  test-device:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # Debug is unsupported for this project (see the note in its .csproj); must build/run Release.
      # No code coverage: the tests execute inside a separately-launched .exe that DeviceRunners
      # spawns and talks to over TCP, so coverlet's in-process collector never sees it.
      # run-tests-coverage.ps1 (local) does capture this via dotnet-coverage's process-tree attach
      # instead -- expect AppWinOnly's coverage numbers here to permanently differ from a local run.
      - name: Build GT4.UI.App.DeviceTests
        run: dotnet build Tests\GT4.UI.App.DeviceTests\GT4.UI.App.DeviceTests.csproj --configuration Release --framework net10.0-windows10.0.19041.0

      - name: Test GT4.UI.App.DeviceTests
        # The DeviceRunners CLI can exit non-zero from a native WinUI teardown race (the spawned
        # test-host process dying after every test already passed) -- observed both as a window-class
        # unregister failure (exit -1) and, separately, as the CLI's TCP link to that process being
        # reset (exit 1, "Unable to read data from the transport connection"). Matching those exact
        # messages is brittle -- a new wording is a new failure mode by definition -- so this trusts the
        # TRX's own pass/fail counters instead, which are ground truth for "did a test actually fail"
        # regardless of how the process exited. The vendor's MSBuild target separately checks a
        # hardcoded "test-results.trx" filename instead of the "device-tests.trx" our --logger arg
        # produces, so it always reports "no TRX written" even when one exists -- ignored here since we
        # check the real path ourselves.
        #
        # Output streams live via the pipeline below so a real hang still shows progress in the Actions
        # log; only the CLI's own ##[error] annotation lines are held back, since whether to keep or
        # strip them depends on the TRX check below that only runs after the process exits (an
        # already-printed GitHub error annotation can't be un-printed).
        run: |
          $trxPath = "coverage\device-tests.trx"
          if (Test-Path $trxPath) { Remove-Item $trxPath -Force }
          $heldBackLines = @()
          & dotnet test Tests\GT4.UI.App.DeviceTests\GT4.UI.App.DeviceTests.csproj --no-build --configuration Release --framework net10.0-windows10.0.19041.0 --logger "trx;LogFileName=device-tests.trx" --results-directory coverage | ForEach-Object {
            if ($_ -match '##\[error\]') {
              $heldBackLines += $_
            } else {
              Write-Host $_
            }
          }
          $exitCode = $LASTEXITCODE

          if (-not (Test-Path $trxPath)) {
            $heldBackLines | ForEach-Object { Write-Host $_ }
            Write-Host "No TRX produced (exit code $exitCode)."
            exit 1
          }

          [xml]$trx = Get-Content $trxPath
          $failed = [int]$trx.TestRun.ResultSummary.Counters.failed
          $total = [int]$trx.TestRun.ResultSummary.Counters.total

          Write-Host "$total total, $failed failed (exit code $exitCode)."

          if ($failed -gt 0) {
            $heldBackLines | ForEach-Object { Write-Host $_ }
            exit 1
          }
          if ($exitCode -ne 0 -and $total -eq 0) {
            $heldBackLines | ForEach-Object { Write-Host $_ }
            Write-Host "CLI exited non-zero (exit code $exitCode) and no tests ran; treating as failure."
            exit 1
          }
          if ($exitCode -ne 0) {
            # Every test that ran passed (TRX ground truth), so the non-zero exit is the spawned
            # test-host process dying during its own teardown, not a real test failure. Surface it as a
            # warning -- not silently -- so a recurring/worsening pattern stays visible in run history.
            Write-Host "::warning::All $total tests passed but the CLI exited non-zero (exit code $exitCode) -- treating as a known device-runner teardown race, not a failure."
            $heldBackLines | ForEach-Object { Write-Host ($_ -replace '##\[error\]', '') }
          }
          exit 0

      - name: Upload device test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-device
          path: coverage\device-tests.trx

  coverage-report:
    needs: [test, test-device]
    if: always()
    runs-on: windows-latest

    steps:
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          path: coverage
          merge-multiple: true

      - name: Download device test results
        uses: actions/download-artifact@v8
        with:
          name: test-results-device
          path: coverage

      - name: Generate coverage report
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator -reports:coverage/**/coverage.cobertura.xml -targetdir:coverage/report -reporttypes:Html

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/report

      - name: Upload test results
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: coverage/*.trx
