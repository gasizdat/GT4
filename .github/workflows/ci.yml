name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - project: Tests\GT4.Core.Project.Tests\GT4.Core.Project.Tests.csproj
            name: core-project
          - project: Tests\GT4.UI.Utils.Tests\GT4.UI.Utils.Tests.csproj
            name: ui-utils
          - project: Tests\GT4.UI.View.Tests\GT4.UI.View.Tests.csproj
            name: ui-view

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build
        run: dotnet build ${{ matrix.project }} --configuration Release

      - name: Test
        run: dotnet test ${{ matrix.project }} --no-build --configuration Release --logger "trx;LogFileName=${{ matrix.name }}.trx" --collect "XPlat Code Coverage" --results-directory coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-${{ matrix.name }}
          path: coverage

  test-device:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # Debug is unsupported for this project (see the note in its .csproj); must build/run Release.
      # No code coverage: the tests execute inside a separately-launched .exe that DeviceRunners
      # spawns and talks to over TCP, so coverlet's in-process collector never sees it.
      # run-tests-coverage.ps1 (local) does capture this via dotnet-coverage's process-tree attach
      # instead -- expect AppWinOnly's coverage numbers here to permanently differ from a local run.
      - name: Build GT4.UI.App.DeviceTests
        run: dotnet build Tests\GT4.UI.App.DeviceTests\GT4.UI.App.DeviceTests.csproj --configuration Release --framework net10.0-windows10.0.19041.0

      - name: Test GT4.UI.App.DeviceTests
        # The DeviceRunners CLI can exit 1 from a native WinUI teardown race (a window-class
        # unregister failure) after every test already passed and its own TRX was written -- and
        # separately, the vendor's MSBuild target checks for a hardcoded "test-results.trx" filename
        # instead of the "device-tests.trx" our --logger arg actually produces, so it reports "no TRX
        # written" even when one exists. Trust the TRX's own pass/fail counters (ground truth) instead
        # of the process exit code, but only for that specific, previously-confirmed race (exit code
        # 1 plus the vendor's own false-positive message) -- any other nonzero exit is treated as a
        # real failure even if the TRX itself shows no failed tests, since a TRX written before a
        # later, unrelated fatal error (e.g. OOM) would otherwise be misreported as success.
        #
        # Output streams live via the pipeline below so a real hang still shows progress in the
        # Actions log; only the one line matching the known false positive is held back, since
        # whether to keep or strip it depends on the TRX/exit-code check that only runs after the
        # process exits (an already-printed GitHub error annotation can't be un-printed).
        run: |
          $trxPath = "coverage\device-tests.trx"
          if (Test-Path $trxPath) { Remove-Item $trxPath -Force }
          $knownFalsePositive = 'DeviceRunners CLI exited with code -1 and no TRX was written'
          $heldBackLines = @()
          & dotnet test Tests\GT4.UI.App.DeviceTests\GT4.UI.App.DeviceTests.csproj --no-build --configuration Release --framework net10.0-windows10.0.19041.0 --logger "trx;LogFileName=device-tests.trx" --results-directory coverage | ForEach-Object {
            if ($_ -match [regex]::Escape($knownFalsePositive)) {
              $heldBackLines += $_
            } else {
              Write-Host $_
            }
          }
          $exitCode = $LASTEXITCODE

          if (-not (Test-Path $trxPath)) {
            $heldBackLines | ForEach-Object { Write-Host $_ }
            Write-Host "No TRX produced (exit code $exitCode)."
            exit 1
          }

          [xml]$trx = Get-Content $trxPath
          $failed = [int]$trx.TestRun.ResultSummary.Counters.failed
          $total = [int]$trx.TestRun.ResultSummary.Counters.total

          $knownRaceExitCode = 1
          $isKnownRace = $exitCode -eq $knownRaceExitCode -and $heldBackLines.Count -gt 0
          foreach ($line in $heldBackLines) {
            if ($failed -eq 0 -and $isKnownRace) {
              Write-Host ($line -replace '##\[error\]', '')
            } else {
              Write-Host $line
            }
          }

          Write-Host "$total total, $failed failed (exit code $exitCode)."

          if ($failed -gt 0) {
            exit 1
          }
          if ($exitCode -ne 0 -and -not $isKnownRace) {
            Write-Host "Tests passed but the CLI exited non-zero for an unrecognized reason (exit code $exitCode); treating as failure."
            exit 1
          }
          if ($exitCode -ne 0) {
            Write-Host "All tests passed but the CLI exited non-zero (known teardown race, exit code $knownRaceExitCode); treating as success."
          }
          exit 0

      - name: Upload device test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-device
          path: coverage\device-tests.trx

  coverage-report:
    needs: [test, test-device]
    if: always()
    runs-on: windows-latest

    steps:
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          path: coverage
          merge-multiple: true

      - name: Download device test results
        uses: actions/download-artifact@v8
        with:
          name: test-results-device
          path: coverage

      - name: Generate coverage report
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator -reports:coverage/**/coverage.cobertura.xml -targetdir:coverage/report -reporttypes:Html

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/report

      - name: Upload test results
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: coverage/*.trx
