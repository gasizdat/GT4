name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # Fast-fail gate: builds every non-mobile project in one shot (App.csproj and
      # AppAndroidOnly.csproj are excluded via the filter -- they need Android/iOS/MacCatalyst
      # workloads this runner doesn't have) so a break anywhere, including in projects no test
      # job builds on its own (e.g. GT4.Tools.RelativesCli), is caught immediately. Runs
      # independently of the test/test-device jobs below -- they keep restoring/building their
      # own project so the concurrency from #38 is unaffected.
      - name: Build solution
        run: dotnet build GT4.CI.slnf --configuration Release

      # AppWinOnly and GT4.UI.App.DeviceTests both conditionally target
      # net10.0-windows10.0.19041.0 in addition to other TFMs, so they're split into their own
      # filter and built with --framework: an unscoped build of DeviceTests here would also compile
      # its net10.0-android TFM, which nothing in CI tests (android device tests only run on
      # physical hardware) and which just slows this gate down.
      - name: Build solution (windows)
        run: dotnet build GT4.CI.Windows.slnf --configuration Release --framework net10.0-windows10.0.19041.0

  test:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - project: Tests\GT4.Core.Project.Tests\GT4.Core.Project.Tests.csproj
            name: core-project
          - project: Tests\GT4.UI.Utils.Tests\GT4.UI.Utils.Tests.csproj
            name: ui-utils
          - project: Tests\GT4.UI.View.Tests\GT4.UI.View.Tests.csproj
            name: ui-view

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build
        run: dotnet build ${{ matrix.project }} --configuration Release

      - name: Test
        run: dotnet test ${{ matrix.project }} --no-build --configuration Release --logger "trx;LogFileName=${{ matrix.name }}.trx" --collect "XPlat Code Coverage" --results-directory coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-${{ matrix.name }}
          path: coverage

  test-device:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # Debug is unsupported for this project (see the note in its .csproj); must build/run Release.
      # No code coverage: the tests execute inside a separately-launched .exe that DeviceRunners
      # spawns and talks to over TCP, so coverlet's in-process collector never sees it.
      # run-tests-coverage.ps1 (local) does capture this via dotnet-coverage's process-tree attach
      # instead -- expect AppWinOnly's coverage numbers here to permanently differ from a local run.
      - name: Build GT4.UI.App.DeviceTests
        run: dotnet build Tests\GT4.UI.App.DeviceTests\GT4.UI.App.DeviceTests.csproj --configuration Release --framework net10.0-windows10.0.19041.0

      - name: Test GT4.UI.App.DeviceTests
        # The DeviceRunners CLI can exit non-zero from a native WinUI teardown race -- the spawned
        # test-host process dying, sometimes after every test already passed, sometimes mid-run -- and
        # the exact symptom varies (a window-class unregister failure, a reset TCP link, ...). There is
        # no reliable way to tell from one run's output alone whether a crash left real tests unexecuted,
        # so this does not try to guess: it just retries the whole attempt. A TRX with any failed test is
        # trusted immediately as a real failure (never retried past); a crash that recorded zero failures
        # is retried, since a genuine bug reproduces on retry while a flaky teardown race usually doesn't.
        run: |
          $maxAttempts = 3
          $success = $false
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "=== Device test attempt $attempt of $maxAttempts ==="
            $trxPath = "coverage\device-tests.trx"
            if (Test-Path $trxPath) { Remove-Item $trxPath -Force }

            & dotnet test Tests\GT4.UI.App.DeviceTests\GT4.UI.App.DeviceTests.csproj --no-build --configuration Release --framework net10.0-windows10.0.19041.0 --logger "trx;LogFileName=device-tests.trx" --results-directory coverage
            $exitCode = $LASTEXITCODE

            if (Test-Path $trxPath) {
              [xml]$trx = Get-Content $trxPath
              $failed = [int]$trx.TestRun.ResultSummary.Counters.failed
              $total = [int]$trx.TestRun.ResultSummary.Counters.total
              Write-Host "Attempt $attempt`: $total total, $failed failed (exit code $exitCode)."

              if ($failed -gt 0) {
                Write-Host "Real test failure recorded -- not retrying."
                exit 1
              }
            } else {
              Write-Host "Attempt $attempt`: no TRX produced (exit code $exitCode)."
            }

            if ($exitCode -eq 0) {
              $success = $true
              break
            }

            if ($attempt -lt $maxAttempts) {
              Write-Host "::warning::Device test attempt $attempt exited non-zero (exit code $exitCode) with no failed tests recorded -- retrying."
            }
          }

          if (-not $success) {
            Write-Host "Device tests did not complete cleanly after $maxAttempts attempts."
            exit 1
          }
          exit 0

      - name: Upload device test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-device
          path: coverage\device-tests.trx

  coverage-report:
    needs: [test, test-device]
    if: always()
    runs-on: windows-latest

    steps:
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          path: coverage
          merge-multiple: true

      - name: Download device test results
        uses: actions/download-artifact@v8
        with:
          name: test-results-device
          path: coverage

      - name: Generate coverage report
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator -reports:coverage/**/coverage.cobertura.xml -targetdir:coverage/report -reporttypes:Html

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/report

      - name: Upload test results
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: coverage/*.trx
