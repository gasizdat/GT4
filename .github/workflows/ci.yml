name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: |
          dotnet build Tests\GT4.Core.Project.Tests\GT4.Core.Project.Tests.csproj --configuration Release
          dotnet build Tests\GT4.UI.Utils.Tests\GT4.UI.Utils.Tests.csproj --configuration Release
          dotnet build Tests\GT4.UI.View.Tests\GT4.UI.View.Tests.csproj --configuration Release

      - name: Test GT4.Core.Project
        run: dotnet test Tests\GT4.Core.Project.Tests\GT4.Core.Project.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=core-project.trx" --collect "XPlat Code Coverage" --results-directory coverage

      - name: Test GT4.UI.Utils
        if: always()
        run: dotnet test Tests\GT4.UI.Utils.Tests\GT4.UI.Utils.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=ui-utils.trx" --collect "XPlat Code Coverage" --results-directory coverage

      - name: Test GT4.UI.View
        if: always()
        run: dotnet test Tests\GT4.UI.View.Tests\GT4.UI.View.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=ui-view.trx" --collect "XPlat Code Coverage" --results-directory coverage

      # Debug is unsupported for this project (see the note in its .csproj); must build/run Release.
      # -p:SolutionDir is required because the referenced AppWinOnly.csproj increments buildnumber.txt
      # relative to it. No code coverage: the tests execute inside a separately-launched .exe that
      # DeviceRunners spawns and talks to over TCP, so coverlet's in-process collector never sees it.
      - name: Build GT4.UI.App.DeviceTests
        if: always()
        run: dotnet build Tests\GT4.UI.App.DeviceTests\GT4.UI.App.DeviceTests.csproj --configuration Release --framework net10.0-windows10.0.19041.0 -p:SolutionDir="$($PWD.Path)\"

      - name: Test GT4.UI.App.DeviceTests
        if: always()
        # --no-build still touches AppCommon.props' buildnumber-increment target (via the
        # referenced AppWinOnly.csproj), so SolutionDir is needed here too, not just at build time.
        #
        # The DeviceRunners CLI can exit non-zero from a native WinUI teardown race (a window-class
        # unregister failure) after every test already passed and its own TRX was written -- and
        # separately, the vendor's MSBuild target checks for a hardcoded "test-results.trx" filename
        # instead of the "device-tests.trx" our --logger arg actually produces, so it reports "no TRX
        # written" even when one exists. Retry a few times for the teardown race, then fall back to
        # the TRX's own pass/fail counters (ground truth) instead of trusting the process exit code.
        run: |
          $trxPath = "coverage\device-tests.trx"
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            if (Test-Path $trxPath) { Remove-Item $trxPath -Force }
            dotnet test Tests\GT4.UI.App.DeviceTests\GT4.UI.App.DeviceTests.csproj --no-build --configuration Release --framework net10.0-windows10.0.19041.0 -p:SolutionDir="$($PWD.Path)\" --logger "trx;LogFileName=device-tests.trx" --results-directory coverage
            $exitCode = $LASTEXITCODE

            if (-not (Test-Path $trxPath)) {
              Write-Host "Attempt $attempt/$maxAttempts : no TRX produced (exit code $exitCode)."
              continue
            }

            [xml]$trx = Get-Content $trxPath
            $failed = [int]$trx.TestRun.ResultSummary.Counters.failed
            $total = [int]$trx.TestRun.ResultSummary.Counters.total
            Write-Host "Attempt $attempt/$maxAttempts : $total total, $failed failed (exit code $exitCode)."

            if ($failed -gt 0) {
              exit 1
            }
            if ($exitCode -eq 0) {
              exit 0
            }
            Write-Host "All tests passed but the CLI exited non-zero (known teardown race); treating as success."
            exit 0
          }

          Write-Host "No TRX produced after $maxAttempts attempts."
          exit 1

      - name: Generate coverage report
        if: always()
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator -reports:coverage/**/coverage.cobertura.xml -targetdir:coverage/report -reporttypes:Html

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/report

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: coverage/*.trx
